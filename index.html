<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="./styles/main.css">
</head>

<body>
    <!-- Sidebar / Menu de Navegação -->
    <aside class="sidebar">
        <div class="logo">
            <i class="ph-fill ph-play-circle"></i>
            <span>StreamVerse</span>
        </div>
        
        <nav class="nav-menu">
            <a href="#" class="nav-item active" data-view="home">
                <i class="ph ph-house"></i>
                <span>Início</span>
            </a>
            <a href="#" class="nav-item" data-view="search">
                <i class="ph ph-magnifying-glass"></i>
                <span>Buscar</span>
            </a>
            <a href="#" class="nav-item" data-view="series">
                <i class="ph ph-film-strip"></i>
                <span>Séries</span>
            </a>
            <a href="#" class="nav-item" data-view="animes">
                <i class="ph ph-monitor-play"></i>
                <span>Animes</span>
            </a>
            <a href="#" class="nav-item" data-view="mylist">
                <i class="ph ph-bookmark-simple"></i>
                <span>Minha Lista</span>
            </a>
        </nav>

        <div class="nav-menu bottom-menu">
            <a href="#" class="nav-item" data-view="settings">
                <i class="ph ph-gear"></i>
                <span>Configurações</span>
            </a>
            <div class="nav-item user-profile" data-view="profile">
                <img src="https://i.pravatar.cc/150?img=11" alt="Perfil">
                <span>Meu Perfil</span>
            </div>
        </div>
    </aside>

    <!-- Área Principal de Conteúdo -->
    <main class="main-content">
        <!-- Roteador Dinâmico -->
        <div id="app-view" class="fade-in">
            <!-- O conteúdo será injetado pelo app.js -->
        </div>
    </main>

    <!-- Sistema de Notificações (Toast) -->
    <div id="toast-container"></div>

    <!-- JavaScript -->
    <script src="./scripts/app.js"></script>
</body>

</html>
